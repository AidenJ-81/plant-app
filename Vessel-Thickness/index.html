<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vessel Thickness</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif; font-size: 13px; background: #f0f3fa; color: #1e293b; overflow: hidden; }

/* ── HEADER ── */
.hdr {
  height: 50px; flex-shrink: 0;
  background: linear-gradient(90deg, #0d1f4e 0%, #183878 100%);
  display: flex; align-items: center; justify-content: space-between; padding: 0 18px;
  border-bottom: none;
}
.hdr-title   { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: .2px; }
.hdr-sub     { color: #7ba4d8; font-size: 10px; margin-top: 2px; }
.hdr-badge   { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); border-radius: 6px; color: #c8d8f0; font-size: 11px; font-weight: 600; padding: 3px 12px; white-space: nowrap; }

/* ── ROOT LAYOUT ── */
.root { display: flex; height: calc(100vh - 50px); overflow: hidden; }

/* ── LEFT PANEL ── */
.left {
  min-width: 320px; max-width: 760px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: #f0f3fa; overflow: hidden;
}
.left-scroll {
  flex: 1; overflow-y: auto; padding: 8px 8px 10px 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.left-scroll::-webkit-scrollbar { width: 4px; }
.left-scroll::-webkit-scrollbar-thumb { background: #b8c8e8; border-radius: 2px; }
.left-foot {
  padding: 8px 10px 10px; background: #f0f3fa;
  border-top: 1px solid #dde5f5;
  display: flex; flex-direction: column; gap: 4px;
}

/* ── SECTION CARD ── */
.card { background: #fff; border-radius: 7px; border: 1px solid #dde5f5; overflow: hidden; }
.card-hdr { display: flex; align-items: center; gap: 7px; padding: 6px 10px 5px; border-bottom: 1px solid #eaeff8; background: #f7f9fe; }
.badge { width: 18px; height: 18px; border-radius: 4px; background: #0d1f4e; color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-title { font-size: 11px; font-weight: 700; color: #1a40b0; letter-spacing: .1px; }
.card-body { padding: 5px 10px 7px; display: flex; flex-direction: column; gap: 3px; }

/* ── FORM ROW ── */
.fr { display: flex; align-items: center; gap: 5px; min-height: 24px; }
.fl { flex: 1; font-size: 11.5px; font-weight: 600; color: #1e3a6e; white-space: nowrap; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.fi {
  border: 1px solid #cdd5eb; border-radius: 5px;
  padding: 2px 6px; font-size: 11px; background: #fff; color: #111;
  outline: none; transition: border-color .15s, box-shadow .15s;
  width: 92px; flex-shrink: 0;
}
.fi:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
.fi-wide { width: 155px; }
.fi-full { width: 100%; }
select.fi { cursor: pointer; }
.fu { font-size: 10.5px; color: #94a3b8; width: 40px; flex-shrink: 0; }

/* ── 2-COLUMN FORM GRID ── */
.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }
.fg2-item { display: flex; flex-direction: column; gap: 1px; }
.fg2-row { display: flex; align-items: center; gap: 4px; }
.fl2 { font-size: 10.5px; font-weight: 600; color: #1e3a6e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fi-s { width: 72px; flex-shrink: 0; }
.fi-auto { background: #eff4ff; border-color: #c3d4f8; font-weight: 700; color: #0d1f4e; }

/* subtext */
.sub-txt { font-size: 9.5px; color: #94a3b8; margin-top: -2px; padding-left: 1px; }
.warn-txt { font-size: 10px; color: #e05c00; margin-top: -1px; }

/* divider within card */
.cdiv { border: none; border-top: 1px dashed #e8edf8; margin: 1px 0; }

/* ── CALC BUTTON ── */
.btn-calc {
  background: #0d1f4e;
  color: #fff; border: none; border-radius: 7px; cursor: pointer;
  font-size: 13px; font-weight: 700; padding: 8px 0; width: 100%;
  letter-spacing: .2px; transition: background .15s, transform .1s;
}
.btn-calc:hover { background: #1a3268; transform: translateY(-1px); }
.btn-calc:active { transform: translateY(0); }

/* ── RIGHT PANEL ── */
.right { flex: 1; overflow-y: auto; padding: 12px 14px 16px 10px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.right::-webkit-scrollbar { width: 4px; }
.right::-webkit-scrollbar-thumb { background: #b8c8e8; border-radius: 2px; }

/* top result card */
.res-head-card {
  background: #fff; border-radius: 8px; border: 1px solid #dde5f5;
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; gap: 12px; flex-shrink: 0;
}
.res-head-info { flex-shrink: 0; }
.res-title { font-size: 15px; font-weight: 700; color: #0d1f4e; }
.res-sub   { font-size: 11px; color: #64748b; margin-top: 2px; }

/* diagram card */
.diag-card {
  background: #fff; border-radius: 8px; border: 1px solid #dde5f5;
  padding: 10px 16px 12px; flex-shrink: 0;
}
.diag-card-hdr {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; padding-bottom: 7px; border-bottom: 1px solid #eaeff8;
}
.diag-card-title { font-size: 11.5px; font-weight: 700; color: #1a40b0; }
.diag-card-sub   { font-size: 10.5px; color: #94a3b8; margin-left: auto; }

/* empty state */
.empty { background: #fff; border-radius: 8px; border: 1px solid #dde5f5; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 20px; gap: 10px; color: #94a3b8; text-align: center; }
.empty-icon { font-size: 44px; opacity: .3; }
.empty-txt  { font-size: 13px; font-weight: 500; line-height: 1.7; }

/* alert banners */
.alert { border-radius: 8px; padding: 8px 13px; font-size: 12px; display: flex; align-items: flex-start; gap: 7px; line-height: 1.5; }
.alert-ok   { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
.alert-warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
.alert-err  { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }

/* ── RESULT TABLES ── */
.rtbl { background: #fff; border-radius: 8px; border: 1px solid #dde5f5; overflow: hidden; }
.rtbl-hdr-row {
  display: grid; background: #0d1f4e; color: #fff;
}
.th { padding: 9px 10px; font-size: 11px; font-weight: 700; text-align: center; border-right: 1px solid rgba(255,255,255,.1); line-height: 1.35; }
.th:last-child { border-right: none; }
.th-sub { font-size: 9.5px; color: #93b8f8; font-weight: 400; }
.th.lft { text-align: left; }
.dr { display: grid; border-bottom: 1px solid #f0f3fb; }
.dr:last-child { border-bottom: none; }
.dr:hover { background: #f8faff; }
.td { padding: 7px 10px; font-size: 12px; text-align: center; border-right: 1px solid #f0f3fb; display: flex; align-items: center; justify-content: center; }
.td:last-child { border-right: none; }
.td.lft { justify-content: flex-start; font-weight: 600; color: #334155; font-size: 11.5px; }
.v    { font-weight: 700; color: #0d1f4e; }
.v-ok { font-weight: 700; color: #16a34a; }
.v-ng { font-weight: 700; color: #dc2626; }
.v-dim { font-size: 11px; color: #94a3b8; }

/* result grid 2-col */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* formula ref bar */
.ref-bar { background: #fff; border: 1px solid #eaeff8; border-radius: 7px; padding: 7px 13px; font-size: 10px; color: #94a3b8; line-height: 1.7; }

/* ── RESPONSIVE ── */
@media (max-width: 960px) {
  .root { flex-direction: column; overflow-y: auto; height: auto; }
  .left { width: 100%; min-width: 0; height: auto; }
  .left-scroll { overflow-y: visible; max-height: none; }
  .right { padding: 0 12px 20px; }
  .grid2 { grid-template-columns: 1fr; }
  html, body { overflow: auto; }
}
@media (max-width: 640px) {
  .rtbl-hdr-row, .dr { grid-template-columns: 1fr !important; }
  .th, .td { border-right: none; border-bottom: 1px solid rgba(255,255,255,.1); }
}

/* ── HELP BUTTON ── */
.btn-help {
  background: #1e3a6e; border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; color: #fff; font-size: 11px; font-weight: 600;
  padding: 4px 13px; cursor: pointer; white-space: nowrap;
  transition: background .15s;
}
.btn-help:hover { background: #254a8a; }

/* ── HELP MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(10,20,50,.52);
  z-index: 9999; display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-box {
  background: #fff; border-radius: 14px;
  box-shadow: 0 8px 40px rgba(10,20,60,.25);
  width: 100%; max-width: 780px; max-height: 88vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 22px 14px;
  background: linear-gradient(90deg, #0d1f4e 0%, #183878 100%);
  flex-shrink: 0;
}
.modal-header-title { color:#fff; font-size:15px; font-weight:700; }
.modal-header-sub   { color:#93b8f8; font-size:10px; margin-top:2px; }
.modal-close {
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.35);
  border-radius: 8px; color:#fff; font-size:13px; font-weight:700;
  padding: 3px 11px; cursor:pointer; transition: background .15s;
}
.modal-close:hover { background: rgba(255,255,255,.32); }
.modal-body {
  overflow-y: auto; padding: 20px 24px 24px;
  display: flex; flex-direction: column; gap: 18px;
}
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background:#b8c8e8; border-radius:2px; }
.help-section { display: flex; flex-direction: column; gap: 7px; }
.help-section-title {
  font-size: 12px; font-weight: 700; color: #0d1f4e;
  padding-bottom: 5px; border-bottom: 2px solid #e8edf8;
  display: flex; align-items: center; gap: 6px;
}
.hs-num {
  background: #1a3580; color:#fff; border-radius:50%;
  width:18px; height:18px; font-size:9.5px;
  display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;
}
.help-table { width:100%; border-collapse:collapse; font-size:11.5px; }
.help-table th {
  background:#f0f4fb; color:#1a3580; font-weight:700;
  padding:5px 10px; text-align:left; border:1px solid #e2e8f4;
}
.help-table td { padding:5px 10px; border:1px solid #e8edf6; vertical-align:top; color:#334155; }
.help-table tr:nth-child(even) td { background:#f8faff; }
.help-note {
  background:#fffbeb; border:1px solid #fcd34d; border-radius:7px;
  padding:9px 13px; font-size:11px; color:#78350f; line-height:1.6;
}
.help-formula {
  background:#f0f4fb; border-left:3px solid #2563eb; border-radius:0 6px 6px 0;
  padding:8px 13px; font-size:11px; color:#1e293b; font-family:monospace; line-height:1.8;
}
.help-p { font-size:11.5px; color:#334155; line-height:1.7; }

/* ── HELP EDIT MODE ── */
.btn-edit {
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.35);
  border-radius: 8px; color:#fff; font-size:11px; font-weight:600;
  padding: 3px 11px; cursor:pointer; transition: background .15s; white-space:nowrap;
}
.btn-edit:hover { background: rgba(255,255,255,.28); }
.btn-edit-active {
  background: #f59e0b; border-color: #d97706; color:#fff;
}
.btn-edit-active:hover { background: #d97706; }
.btn-save {
  background: #16a34a; border: none; border-radius: 8px;
  color:#fff; font-size:11px; font-weight:700;
  padding: 3px 13px; cursor:pointer; transition: background .15s;
}
.btn-save:hover { background: #15803d; }
.btn-reset {
  background: none; border: 1px solid #e2e8f4; border-radius: 8px;
  color:#64748b; font-size:11px; font-weight:600;
  padding: 3px 11px; cursor:pointer; transition: background .15s;
}
.btn-reset:hover { background: #f1f5f9; }
.edit-bar {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; background:#fffbeb;
  border-bottom:1px solid #fcd34d; flex-shrink:0;
  font-size:11px; color:#92400e;
}
.edit-bar-msg { flex:1; }
.editable-text {
  border: 1.5px dashed #94a3b8; border-radius:5px;
  padding:4px 7px; min-height:28px; width:100%;
  outline:none; font-size:11.5px; color:#334155; line-height:1.7;
  background:#fffef5; cursor:text; white-space:pre-wrap;
}
.editable-text:focus { border-color:#f59e0b; background:#fffdf0; }
.editable-cell {
  border:1.5px dashed #94a3b8; border-radius:4px;
  padding:2px 5px; outline:none; font-size:11.5px;
  color:#334155; background:#fffef5; min-width:30px;
  cursor:text; white-space:pre-wrap;
}
.editable-cell:focus { border-color:#f59e0b; background:#fffdf0; }
.download-bar {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; background:#f0fdf4;
  border-top:1px solid #bbf7d0; flex-shrink:0;
}
.btn-download {
  background: #1a3580; border:none; border-radius:8px;
  color:#fff; font-size:12px; font-weight:700;
  padding:5px 16px; cursor:pointer; transition:background .15s;
}
.btn-download:hover { background: #2054c8; }
.dl-msg { font-size:11px; color:#166534; }
</style>
</head>

<div id="root"></div>

function iS(st, T) {
  if (!st||!st.length) return null;
  if (T<=st[0].t) return st[0].s;
  const last=st[st.length-1];
  if (T>=last.t) return last.s;
  for (let i=0;i<st.length-1;i++) {
    if (T>=st[i].t && T<=st[i+1].t) {
      const f=(T-st[i].t)/(st[i+1].t-st[i].t);
      return st[i].s+f*(st[i+1].s-st[i].s);
    }
  }
  return null;
}


// ── HELP MODAL RENDERER ──────────────────────────────────────────
function renderText(text) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p,i)=>p.startsWith('**')&&p.endsWith('**')
    ?<strong key={i}>{p.slice(2,-2)}</strong>:p);
}

function HelpModal({ onClose }) {
  const [editMode, setEditMode] = React.useState(false);
  const [saved,    setSaved]    = React.useState(false);
  // 편집용 deep copy — HELP_CONTENT를 JSON 복사해서 state로 관리
  const [data, setData] = React.useState(()=>JSON.parse(JSON.stringify(HELP_CONTENT)));

  // 텍스트 블록 변경
  const setBlockText = (si,bi,val) => {
    setData(d=>{
      const nd=JSON.parse(JSON.stringify(d));
      nd.sections[si].blocks[bi].text=val;
      return nd;
    });
  };
  // 표 셀 변경
  const setCellVal = (si,bi,ri,ci,val) => {
    setData(d=>{
      const nd=JSON.parse(JSON.stringify(d));
      nd.sections[si].blocks[bi].rows[ri][ci]=val;
      return nd;
    });
  };
  // 섹션 제목 변경
  const setSecTitle = (si,val) => {
    setData(d=>{const nd=JSON.parse(JSON.stringify(d));nd.sections[si].title=val;return nd;});
  };

  // index.html 다운로드: 현재 HELP_CONTENT를 수정된 데이터로 교체해서 저장
    const downloadHTML = () => {
    // script 태그 원본 텍스트 가져오기
    const scriptEl = document.querySelector('script[type="text/babel"]');
    const orig = scriptEl.textContent;
    // HELP_CONTENT 블록 경계 찾기
    const m1 = 'const HELP_CONTENT = {';
    const m2 = '}; // end HELP_CONTENT';
    const i1 = orig.indexOf(m1);
    const i2 = orig.indexOf(m2) + m2.length;
    if (i1 < 0 || i2 < m2.length) { alert('저장 위치를 찾을 수 없습니다.'); return; }
    // 새 HELP_CONTENT 직렬화 (JSON.stringify는 Babel과 무관하게 런타임 동작)
    const newBlock = 'const HELP_CONTENT = ' + JSON.stringify(data, null, 2) + '; // end HELP_CONTENT';
    const newScript = orig.slice(0, i1) + newBlock + orig.slice(i2);
    // 전체 HTML 구성: outerHTML 대신 직접 조합
    const fullHTML = document.documentElement.outerHTML.split(orig).join(newScript);
    const blob = new Blob([fullHTML], {type: 'text/html;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setSaved(true);
    setTimeout(function(){ setSaved(false); }, 3000);
  };

  const resetData = () => {
    if(window.confirm('도움말을 원래 내용으로 초기화할까요?')) {
      setData(JSON.parse(JSON.stringify(HELP_CONTENT)));
    }
  };

  const { sections } = data;

  return (
    <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">

        {/* 헤더 */}
        <div className="modal-header">
          <div>
            <div className="modal-header-title">📖 {data.title}</div>
            <div className="modal-header-sub">{data.subtitle}</div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <button className={`btn-edit ${editMode?'btn-edit-active':''}`}
              onClick={()=>setEditMode(v=>!v)}>
              {editMode ? '✏️ 편집 중' : '✏️ 편집'}
            </button>
            <button className="modal-close" onClick={onClose}>✕ 닫기</button>
          </div>
        </div>

        {/* 편집 중 안내 바 */}
        {editMode && (
          <div className="edit-bar">
            <span className="edit-bar-msg">✏️ 텍스트를 클릭해서 바로 수정하세요. 수정 후 반드시 <strong>저장 후 다운로드</strong>하여 GitHub에 올려주세요.</span>
            <button className="btn-reset" onClick={resetData}>↩ 초기화</button>
          </div>
        )}

        {/* 본문 */}
        <div className="modal-body">
          {sections.map((sec, si) => (
            <div key={si} className="help-section">
              <div className="help-section-title">
                <span className="hs-num">{si+1}</span>
                {editMode
                  ? <span contentEditable={true} suppressContentEditableWarning={true}
                      style={{outline:'none',borderBottom:'1.5px dashed #f59e0b',minWidth:60,cursor:'text'}}
                      onBlur={e=>setSecTitle(si,e.target.innerText)}>
                      {sec.title}
                    </span>
                  : sec.title
                }
              </div>
              {sec.blocks.map((blk,bi) => {
                if (blk.type==='text') return (
                  <p key={bi} className="help-p">
                    {editMode
                      ? <span contentEditable={true} suppressContentEditableWarning={true}
                          className="editable-text" style={{display:'block'}}
                          onBlur={e=>setBlockText(si,bi,e.target.innerText)}>
                          {blk.text}
                        </span>
                      : renderText(blk.text)
                    }
                  </p>
                );
                if (blk.type==='note') return (
                  <div key={bi} className="help-note">
                    {editMode
                      ? <span contentEditable={true} suppressContentEditableWarning={true}
                          style={{display:'block',outline:'none',cursor:'text'}}
                          onBlur={e=>setBlockText(si,bi,e.target.innerText)}>
                          {blk.text}
                        </span>
                      : renderText(blk.text)
                    }
                  </div>
                );
                if (blk.type==='formula') return (
                  <div key={bi} className="help-formula">
                    {editMode
                      ? <span contentEditable={true} suppressContentEditableWarning={true}
                          style={{display:'block',outline:'none',cursor:'text',whiteSpace:'pre'}}
                          onBlur={e=>setBlockText(si,bi,e.target.innerText)}>
                          {blk.text}
                        </span>
                      : blk.text

                  </div>
                );
                if (blk.type==='table') return (
                  <table key={bi} className="help-table">
                    <thead>
                      <tr>{blk.headers.map((h,hi)=><th key={hi}>{h}</th>)}</tr>
                    </thead>
                    <tbody>
                      {blk.rows.map((row,ri)=>(
                        <tr key={ri}>
                          {row.map((cell,ci)=>(
                            <td key={ci}>
                              {editMode
                                ? <span contentEditable={true} suppressContentEditableWarning={true}
                                    className="editable-cell"
                                    onBlur={e=>setCellVal(si,bi,ri,ci,e.target.innerText)}>
                                    {cell}
                                  </span>
                                : renderText(cell)
                              }
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                );
                return null;
              })}
            </div>
          ))}
        </div>

        {/* 저장 바 — 편집 모드일 때만 표시 */}
        {editMode && (
          <div className="download-bar">
            <button className="btn-download" onClick={downloadHTML}>
              💾 저장 후 다운로드 (index.html)
            </button>
            <span className="dl-msg">
              {saved
                ? '✅ 다운로드 완료! GitHub에 index.html을 올리면 모든 방문자에게 반영됩니다.'
                : '수정 내용을 저장하고 GitHub에 올리면 모든 방문자에게 반영됩니다.'}
            </span>
          </div>
        )}

      </div>
    </div>
  );
}

// ── HELPERS ──────────────────────────────────────────────────────
// Exact surface area of one 2:1 semi-ellipsoidal head (mean-diameter basis)
// a = equatorial semi-axis (= mean_radius), b = a/2
function ellipsoidSurface(a) {
  const b=a/2, e=Math.sqrt(1-(b/a)**2);
  return Math.PI*a*a*(1+(b/a)**2/e*Math.atanh(e));
}
// Horizontal cylinder liquid segment area at height H_m, radius R_m
function segmentArea(R_m, H_m) {
  if (H_m<=0) return 0;
  if (H_m>=2*R_m) return Math.PI*R_m*R_m;
  const c=Math.max(-1,Math.min(1,1-H_m/R_m)), θ=Math.acos(c);
  return R_m*R_m*(θ-Math.sin(θ)*c);
}
// Exact liquid volume in one horizontal 2:1 ellipsoidal head
// by numerical integration along vessel axis (N=400 slices)
function headLiquidVol(R_m, H_m) {
  const b=R_m/2, N=400, dx=b/N;
  let V=0;
  for (let i=0;i<N;i++){
    const x=(i+0.5)*dx;
    const r=R_m*Math.sqrt(1-(x/b)**2);
    V+=segmentArea(r,H_m)*dx;
  }
  return V;
}

// ── CALCULATION ──────────────────────────────────────────────────
function calc(i) {
  const {P,T,D,L,H,rhoL,mat,CA,E,ts_in,th_in,rhoI,ti,orient,head}=i;
  const warns=[];
  const S=iS(mat.st,T);
  if (!S) return {err:'해당 온도에서 허용응력을 결정할 수 없습니다.'};

  const D_cm=D/10, R_cm=D_cm/2;

  // ── Shell UG-27(c)(1) : t = P·R / (S·E − 0.6P) ──────────────
  if (S*E<=0.6*P) return {err:`S×E (${(S*E).toFixed(0)}) ≤ 0.6×P (${(0.6*P).toFixed(2)}) — 재료·압력 재검토 필요`};
  const ts_net_min=(P*R_cm)/(S*E-0.6*P)*10;       // mm, net
  const ts_prime=ts_net_min+CA;                      // mm, required incl. CA
  if (ts_net_min<1.6) warns.push(`Shell 최소두께 ${ts_net_min.toFixed(2)}mm < ASME UG-16 최소 1.6mm`);
  const ts_used=ts_in>0?ts_in:Math.ceil(ts_prime);
  if (ts_in>0&&ts_in<ts_prime) warns.push(`⚠ Shell 입력두께 ${ts_in}mm < 필요최소 ${ts_prime.toFixed(2)}mm`);

  // ── Head UG-32 ────────────────────────────────────────────────
  // th_prime  = B.F. (Before Forming) required thickness, incl. CA
  // tf_prime  = A.F. (After Forming)  required thickness, incl. CA
  // B.F.→A.F.: divide by 0.875 for formed heads (12.5% mill under-tolerance)
  let th_af_net, tf_prime, th_prime;
  if (head==='2:1 Ellipsoidal') {
    if (2*S*E<=0.2*P) return {err:'Head 계산 한계 초과'};
    th_af_net=(P*D_cm)/(2*S*E-0.2*P)*10;            // A.F. net minimum
    tf_prime=th_af_net+CA;                            // A.F. required (incl. CA)
    th_prime=tf_prime/0.875;                          // B.F. required
  } else if (head==='Hemispherical') {
    th_af_net=(P*R_cm)/(2*S*E-0.2*P)*10;
    tf_prime=th_af_net+CA; th_prime=tf_prime;         // no forming thinning
  } else if (head==='ASME F&D') {
    th_af_net=(0.885*P*D_cm)/(S*E-0.1*P)*10;
    tf_prime=th_af_net+CA; th_prime=tf_prime/0.875;
  } else { // Flat
    th_af_net=D*0.33*Math.sqrt(P/(S*E));
    tf_prime=th_af_net+CA; th_prime=tf_prime;
  }
  const th_used=th_in>0?th_in:Math.ceil(th_prime);
  if (th_in>0&&th_in<th_prime) warns.push(`⚠ Head 입력두께 ${th_in}mm < 필요최소 ${th_prime.toFixed(2)}mm`);

  // ── MAWP ─────────────────────────────────────────────────────
  // Shell: t_net_actual = (ts_used − CA), unit = cm
  const ts_na=(ts_used-CA)/10;
  const Ms=(S*E*ts_na)/(R_cm+0.6*ts_na);
  // Head: for formed heads use A.F. net actual = ts_used×0.875 − CA
  const isBF=(head==='2:1 Ellipsoidal'||head==='ASME F&D');
  const th_aa=isBF?(th_used*0.875-CA)/10:(th_used-CA)/10;
  let Mh=null;
  if (head==='2:1 Ellipsoidal') Mh=(2*S*E*th_aa)/(D_cm+0.2*th_aa);
  else if (head==='Hemispherical') Mh=(2*S*E*th_aa)/(R_cm+0.2*th_aa);
  else if (head==='ASME F&D') Mh=(S*E*th_aa)/(0.885*D_cm+0.1*th_aa);

  // ── Static head pressure ─────────────────────────────────────
  const H_m=H/1000, D_m=D/1000, L_m=L/1000, R_m=D_m/2;
  const SPs=(rhoL*H_m)/10000;   // kg/cm²G  (H in m, ρ in kg/m³)
  if (P+SPs>Ms) warns.push(`P + 정수압 (${(P+SPs).toFixed(3)}) > Shell MAWP (${Ms.toFixed(3)}) kg/cm²G`);

  // ── Volume ───────────────────────────────────────────────────
  const Vs_v=Math.PI*R_m*R_m*L_m*1000;             // L
  let Vh_e=0;
  if      (head==='2:1 Ellipsoidal') Vh_e=Math.PI*D_m*D_m*D_m/24*1000;
  else if (head==='Hemispherical')   Vh_e=2/3*Math.PI*R_m*R_m*R_m*1000;
  else if (head==='ASME F&D')        Vh_e=Math.PI*0.000049*D_m*D_m*D_m*1000; // ≈0.1308×D³/8
  const Vh_v=2*Vh_e;

  let Vs_l=0, Vh_l=0;
  const isH=orient.includes('수평');
  if (isH) {
    // Shell liquid: circular segment × length
    Vs_l=(H_m>=D_m?Math.PI*R_m*R_m:segmentArea(R_m,H_m))*L_m*1000;
    // Head liquid: exact numerical integration
    if (head==='2:1 Ellipsoidal'||head==='Hemispherical'||head==='ASME F&D') {
      Vh_l=2*headLiquidVol(R_m,H_m)*1000;
    } else {
      Vh_l=0;
    }
  } else {
    // Vertical
    Vs_l=Math.PI*R_m*R_m*Math.min(H_m,L_m)*1000;
    Vh_l=H_m>L_m?Vh_v:(H_m>0?Vh_e:0);
  }

  // ── Surface area ─────────────────────────────────────────────
  // Shell: mean-OD basis = π×(D+ts)×L  (bare metal)
  const ts_mm=ts_used, th_mm=th_used;
  const As   = Math.PI*(D+ts_mm)/1000*L_m;               // bare metal
  const As_p = Math.PI*(D+2*ts_mm)/1000*L_m;             // painting (OD)
  const As_i = Math.PI*(D+2*ts_mm+2*ti)/1000*L_m;        // insulation

  // Head: exact 2:1 ellipsoidal surface with mean diameter basis
  // a = mean equatorial radius = (D + th) / 2
  let Ah_e, Ah_e_p, Ah_e_i;
  if (head==='2:1 Ellipsoidal') {
    Ah_e   = ellipsoidSurface((D+th_mm)/2/1000);
    Ah_e_p = ellipsoidSurface((D+2*th_mm)/2/1000);
    Ah_e_i = ellipsoidSurface((D+2*th_mm+2*ti)/2/1000);
  } else if (head==='Hemispherical') {
    Ah_e   = 2*Math.PI*((D+th_mm)/2/1000)**2;
    Ah_e_p = 2*Math.PI*((D+2*th_mm)/2/1000)**2;
    Ah_e_i = 2*Math.PI*((D+2*th_mm+2*ti)/2/1000)**2;
  } else if (head==='ASME F&D') {
    Ah_e   = 0.91*Math.PI*(D/2/1000)**2;
    Ah_e_p = 0.91*Math.PI*((D/2+th_mm)/1000)**2;
    Ah_e_i = 0.91*Math.PI*((D/2+th_mm+ti)/1000)**2;
  } else {
    Ah_e=Ah_e_p=Ah_e_i=Math.PI*(D/2/1000)**2;
  }
  const Ah   = 2*Ah_e,   At   = As   + Ah;
  const Ah_p = 2*Ah_e_p, At_p = As_p + Ah_p;
  const Ah_i = 2*Ah_e_i, At_i = As_i + Ah_i;

  // ── Weight ───────────────────────────────────────────────────
  // Shell: π×(D+ts)×ts×L (mean-OD circumference × thickness × length)
  const Ws = mat.den * Math.PI*(D+ts_mm)/1000*(ts_mm/1000)*L_m;
  // Head: exact half-ellipsoid shell volume = V_outer − V_inner
  // V_half-ellipsoid = 2π/3 × a² × b  where a=equatorial radius, b=a/2
  let Wh;
  if (head==='2:1 Ellipsoidal') {
    const th_af_actual = isBF ? th_mm*0.875 : th_mm;     // A.F. mm
    const a_o=(D+2*th_af_actual)/2/1000, b_o=a_o/2;
    const a_i=D/2/1000,                  b_i=a_i/2;
    const Vone=2*Math.PI/3*(a_o*a_o*b_o - a_i*a_i*b_i);
    Wh=mat.den*2*Vone;
  } else if (head==='Hemispherical') {
    const th_af_actual = th_mm;
    const r_o=(D+2*th_af_actual)/2/1000, r_i=D/2/1000;
    Wh=mat.den*2*(2*Math.PI/3)*(r_o**3-r_i**3);
  } else {
    // F&D / Flat: surface × thickness approximation
    const th_af_actual = isBF ? th_mm*0.875 : th_mm;
    Wh=mat.den*Ah*(th_af_actual/1000);
  }
  const Wt=Ws+Wh;
  // Empty Weight = structural weight (shell+heads only, no nozzles/internals here)
  const We=Wt;
  // Operating weight = empty + liquid
  const Wo=We+(Vs_l+Vh_l)/1000*rhoL;
  // Insulation weight = density × total insulation surface × thickness
  const Wi=rhoI*At_i*(ti/1000);

  const f=(v,d=2)=>v!=null?parseFloat(v.toFixed(d)).toString():'—';
  return {
    S:f(S,0), ts_prime:f(ts_prime), th_prime:f(th_prime), tf_prime:f(tf_prime),
    ts_used:f(ts_used,1), th_used:f(th_used,1),
    Ms:f(Ms,3), Mh:Mh!=null?f(Mh,3):'—',
    SPs:f(SPs,4), SPh:f(SPs,4),
    As:f(As,2), Ah:f(Ah,2), At:f(At,2),
    As_p:f(As_p,2), Ah_p:f(Ah_p,2), At_p:f(At_p,2),
    As_i:f(As_i,2), Ah_i:f(Ah_i,2), At_i:f(At_i,2),
    den:mat.den.toString(),
    Ws:f(Ws,0), Wh:f(Wh,0), Wt:f(Wt,0), We:f(We,0), Wo:f(Wo,0), Wi:f(Wi,1),
    Vs_v:f(Vs_v,0), Vs_l:f(Vs_l,0), Vh_v:f(Vh_v,0), Vh_l:f(Vh_l,0),
    Vt_v:f(Vs_v+Vh_v,0), Vt_l:f(Vs_l+Vh_l,0),
    Ms_ok:Ms>=P, Mh_ok:Mh!=null?Mh>=P:true,
    warns,
  };
}

// ── VESSEL DIAGRAM ───────────────────────────────────────────────
function Diagram({ D, L, H, orient }) {
  const isH = orient.includes('수평');

  // shared arrow markers
  const Markers = () => (
    <defs>
      <marker id="mA" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L7,3.5 L0,7 Z" fill="#1a5490"/>
      </marker>
      <marker id="mB" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
        <path d="M7,0 L0,3.5 L7,7 Z" fill="#1a5490"/>
      </marker>
      <marker id="mC" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L7,3.5 L0,7 Z" fill="#2563eb"/>
      </marker>
      <marker id="mD" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
        <path d="M7,0 L0,3.5 L7,7 Z" fill="#2563eb"/>
      </marker>
    </defs>
  );

  if (isH) {
    // viewBox: fixed coordinate space — SVG scales to fill container
    const VW = 420, VH = 165;
    const mL = 44, mR = 28, mT = 14, mB = 38;
    const vW = VW - mL - mR;
    const vHmax = VH - mT - mB;

    const ratio = (D > 0 && L > 0) ? Math.min(D / L, 0.72) : 0.38;
    const vH = Math.max(Math.min(ratio * vW, vHmax), 52);
    const x0 = mL, y0 = mT + (vHmax - vH) / 2;
    const x1 = x0 + vW, y1 = y0 + vH;
    const rx = vH / 2;          // fully rounded heads (stadium shape)
    const cY = y0 + vH / 2;    // horizontal centerline Y
    const tL = x0 + rx;        // left tangent X
    const tR = x1 - rx;        // right tangent X

    const lF = (D > 0) ? Math.min(1, Math.max(0, H / D)) : 0;
    const liqY = y1 - lF * vH;

    // D arrow: left-outside vertical; H arrow: right-inside vertical; L: bottom horizontal
    const dX  = x0 - 22;         // D arrow X
    const hX  = tR + (x1 - tR) * 0.55; // H arrow X (inside right head area)
    const lY2 = y1 + 26;         // L arrow Y

    return (
      <svg viewBox={`0 0 ${VW} ${VH}`} width="100%"
           style={{display:'block', maxHeight:155, overflow:'visible'}}>
        <Markers/>
        <clipPath id="vClipH">
          <rect x={x0} y={y0} width={vW} height={vH} rx={rx} ry={rx}/>
        </clipPath>

        {/* Liquid fill */}
        {lF > 0 && (
          <rect x={x0} y={liqY} width={vW} height={y1 - liqY}
                fill="rgba(37,99,235,0.13)" clipPath="url(#vClipH)"/>
        )}

        {/* Vessel outline */}
        <rect x={x0} y={y0} width={vW} height={vH} rx={rx} ry={rx}
              fill="none" stroke="#1a5490" strokeWidth="1.6"/>

        {/* Dashed tangent lines */}
        <line x1={tL} y1={y0-5} x2={tL} y2={y1+5}
              stroke="#1a5490" strokeWidth="1" strokeDasharray="5,3"/>
        <line x1={tR} y1={y0-5} x2={tR} y2={y1+5}
              stroke="#1a5490" strokeWidth="1" strokeDasharray="5,3"/>

        {/* Horizontal centerline */}
        <line x1={x0-6} y1={cY} x2={x1+6} y2={cY}
              stroke="#1a5490" strokeWidth="0.8" strokeDasharray="9,5"/>

        {/* Liquid surface line */}
        {lF > 0 && lF < 1 && (
          <line x1={x0+4} y1={liqY} x2={x1-4} y2={liqY}
                stroke="#2563eb" strokeWidth="1.1" strokeDasharray="6,3"/>
        )}

        {/* ── D arrow (left outside, top→bottom) ── */}
        <line x1={dX} y1={y0} x2={dX} y2={y1}
              stroke="#1a5490" strokeWidth="1.3"
              markerStart="url(#mB)" markerEnd="url(#mA)"/>
        {/* tick marks */}
        <line x1={dX-5} y1={y0} x2={dX+5} y2={y0} stroke="#1a5490" strokeWidth="1"/>
        <line x1={dX-5} y1={y1} x2={dX+5} y2={y1} stroke="#1a5490" strokeWidth="1"/>
        <text x={dX-10} y={cY+5} fontSize="14" fontWeight="700" fill="#1a5490" textAnchor="middle">D</text>

        {/* ── H arrow (inside right-head area, bottom→liquid) ── */}
        {lF > 0 && lF < 0.99 && (
          <>
            <line x1={hX} y1={liqY} x2={hX} y2={y1}
                  stroke="#2563eb" strokeWidth="1.3"
                  markerStart="url(#mD)" markerEnd="url(#mC)"/>
            <text x={hX + 10} y={(liqY + y1) / 2 + 5}
                  fontSize="13" fontWeight="700" fill="#2563eb">H</text>
          </>
        )}

        {/* ── L arrow (bottom, full width) ── */}
        <line x1={x0} y1={lY2} x2={x1} y2={lY2}
              stroke="#1a5490" strokeWidth="1.3"
              markerStart="url(#mB)" markerEnd="url(#mA)"/>
        <line x1={x0} y1={lY2-6} x2={x0} y2={lY2+6} stroke="#1a5490" strokeWidth="1"/>
        <line x1={x1} y1={lY2-6} x2={x1} y2={lY2+6} stroke="#1a5490" strokeWidth="1"/>
        <text x={(x0+x1)/2} y={lY2+14} fontSize="13" fontWeight="700" fill="#1a5490" textAnchor="middle">L</text>
      </svg>
    );

  } else {
    // ── Vertical vessel ──
    const VW = 220, VH = 230;
    const mL = 36, mR = 44, mT = 16, mB = 38;
    const vHmax = VH - mT - mB, vWmax = VW - mL - mR;

    const ratio = (D > 0 && L > 0) ? Math.min(D / L, 1.2) : 0.35;
    const vH = Math.max(vHmax, 80);
    const vW = Math.max(Math.min(ratio * vH, vWmax), 36);
    const x0 = mL + (vWmax - vW) / 2, y0 = mT;
    const x1 = x0 + vW, y1 = y0 + vH;
    const ry = vW * 0.22;
    const cX = x0 + vW / 2;

    const lF = (L > 0) ? Math.min(1, Math.max(0, H / L)) : 0;
    const liqY = y1 - lF * vH;

    return (
      <svg viewBox={`0 0 ${VW} ${VH}`} width="100%"
           style={{display:'block', maxHeight:210, overflow:'visible'}}>
        <Markers/>
        <clipPath id="vClipV">
          <rect x={x0} y={y0} width={vW} height={vH}/>
        </clipPath>

        {lF > 0 && (
          <rect x={x0} y={liqY} width={vW} height={y1-liqY}
                fill="rgba(37,99,235,.13)" clipPath="url(#vClipV)"/>
        )}
        <rect x={x0} y={y0} width={vW} height={vH}
              fill="none" stroke="#1a5490" strokeWidth="1.6"/>
        <ellipse cx={cX} cy={y0} rx={vW/2} ry={ry}
                 fill="none" stroke="#1a5490" strokeWidth="1.6"/>
        <ellipse cx={cX} cy={y1} rx={vW/2} ry={ry}
                 fill="none" stroke="#1a5490" strokeWidth="1.6"/>

        {/* Centerline horizontal */}
        <line x1={x0-4} y1={(y0+y1)/2} x2={x1+4} y2={(y0+y1)/2}
              stroke="#1a5490" strokeWidth="0.8" strokeDasharray="8,4"/>

        {lF > 0 && lF < 1 && (
          <line x1={x0+2} y1={liqY} x2={x1-2} y2={liqY}
                stroke="#2563eb" strokeWidth="1.1" strokeDasharray="6,3"/>
        )}

        {/* D arrow bottom */}
        <line x1={x0} y1={y1+24} x2={x1} y2={y1+24}
              stroke="#1a5490" strokeWidth="1.3" markerStart="url(#mB)" markerEnd="url(#mA)"/>
        <line x1={x0} y1={y1+18} x2={x0} y2={y1+30} stroke="#1a5490" strokeWidth="1"/>
        <line x1={x1} y1={y1+18} x2={x1} y2={y1+30} stroke="#1a5490" strokeWidth="1"/>
        <text x={cX} y={y1+38} fontSize="13" fontWeight="700" fill="#1a5490" textAnchor="middle">D</text>

        {/* L arrow right side */}
        <line x1={x1+24} y1={y0} x2={x1+24} y2={y1}
              stroke="#1a5490" strokeWidth="1.3" markerStart="url(#mB)" markerEnd="url(#mA)"/>
        <line x1={x1+18} y1={y0} x2={x1+30} y2={y0} stroke="#1a5490" strokeWidth="1"/>
        <line x1={x1+18} y1={y1} x2={x1+30} y2={y1} stroke="#1a5490" strokeWidth="1"/>
        <text x={x1+36} y={(y0+y1)/2+5} fontSize="13" fontWeight="700" fill="#1a5490">L</text>

        {lF > 0 && lF < 1 && (
          <>
            <line x1={x0-22} y1={liqY} x2={x0-22} y2={y1}
                  stroke="#2563eb" strokeWidth="1.3" markerStart="url(#mD)" markerEnd="url(#mC)"/>
            <line x1={x0-28} y1={liqY} x2={x0-16} y2={liqY} stroke="#2563eb" strokeWidth="1"/>
            <text x={x0-30} y={(liqY+y1)/2+5} fontSize="13" fontWeight="700" fill="#2563eb" textAnchor="middle">H</text>
          </>
        )}
      </svg>
    );
  }
}

// ── APP ──────────────────────────────────────────────────────────
function App() {
  // ── resize ──
  const [leftW,   setLeftW]    = useState(490);
  const dragging = useRef(false);
  const dragStart = useRef({x:0, w:0});
  useEffect(() => {
    const onMove = e => {
      if (!dragging.current) return;
      const dx = e.clientX - dragStart.current.x;
      setLeftW(Math.max(280, Math.min(680, dragStart.current.w + dx)));
    };
    const onUp = () => { dragging.current = false; document.body.style.cursor=''; document.body.style.userSelect=''; };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, []);
  const onDivider = e => {
    dragging.current = true;
    dragStart.current = { x: e.clientX, w: leftW };
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  };

  const [orient,  setOrient]   = useState('수평 (Horizontal)');
  const [head,    setHead]     = useState('2:1 Ellipsoidal');
  const [DP,      setDP]       = useState('20.5');
  const [DT,      setDT]       = useState('350');
  const [D,       setD]        = useState('2000');
  const [L,       setL]        = useState('5000');
  const [H,       setH]        = useState('1700');
  const [rhoL,    setRhoL]     = useState('950');
  const [matType, setMatType]  = useState('Ferrous');
  const [spec,    setSpec]     = useState('SA-516 70 K02700 PNo.1');
  const [CA,      setCA]       = useState('3');
  const [E,       setE]        = useState('0.85');
  const [ts_in,   setTsIn]     = useState('');
  const [th_in,   setThIn]     = useState('');
  const [rhoI,    setRhoI]     = useState('120');
  const [ti,      setTi]       = useState('100');
  const [userS,   setUserS]    = useState('');
  const [useUS,   setUseUS]    = useState(false);
  const [r,       setR]        = useState(null);
  const [helpOpen, setHelpOpen] = useState(false);

  const specs = (MATS[matType]||[]).map(m=>m.spec);
  const autoS = (() => {
    const m=(MATS[matType]||[]).find(m=>m.spec===spec);
    const v=m?iS(m.st,parseFloat(DT)||20):null;
    return v?Math.round(v).toString():'';
  })();

  const onMT = v => { setMatType(v); const l=MATS[v]||[]; if(l.length) setSpec(l[0].spec); };

  const doCalc = () => {
    const mat=(MATS[matType]||[]).find(m=>m.spec===spec);
    if(!mat){setR({err:'재료 선택 오류'}); return;}
    const matU=useUS&&userS?{...mat,st:[{t:-999,s:parseFloat(userS)},{t:9999,s:parseFloat(userS)}]}:mat;
    setR(calc({
      P:parseFloat(DP)||0, T:parseFloat(DT)||20,
      D:parseFloat(D)||0,  L:parseFloat(L)||0,
      H:parseFloat(H)||0,  rhoL:parseFloat(rhoL)||0,
      mat:matU, CA:parseFloat(CA)||0, E:parseFloat(E)||1,
      ts_in:parseFloat(ts_in)||0, th_in:parseFloat(th_in)||0,
      rhoI:parseFloat(rhoI)||0,   ti:parseFloat(ti)||0,
      orient, head,
    }));
  };

  const dpMPa = ((parseFloat(DP)||0)*0.0981).toFixed(3);
  const tCols  = '2.2fr 1fr 1fr 1fr 1fr 1fr 1fr';
  const mCols  = '2fr 1fr 1fr 1fr 1fr';
  const vCols  = '1.6fr .8fr 1fr 1fr';
  const aCols  = '1.6fr .8fr 1fr';
  const wCols  = '1.6fr 1fr 1fr 1fr 1fr 1fr';

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>

      {/* HEADER */}
      <div className="hdr">
        <div>
          <div className="hdr-title">Vessel Thickness</div>
          <div className="hdr-sub">ASME Sec.VIII Div.1 압력용기 두께 계산 — UG-27, UG-32 | 재질 DB: BPVC Sec.II-D + B31.3</div>
        </div>
        <button className="btn-help" onClick={()=>setHelpOpen(true)}>도움말</button>

      {helpOpen && <HelpModal onClose={()=>setHelpOpen(false)}/>}
      </div>

      <div className="root">

        {/* ═══ LEFT ═══ */}
        <div className="left" style={{width: leftW}}>
          <div className="left-scroll">

            {/* 01 재질 */}
            <div className="card">
              <div className="card-hdr"><div className="badge">01</div><div className="card-title">재질 · 규격 (STANDARD / MATERIAL)</div></div>
              <div className="card-body">
                <div className="fr">
                  <span className="fl">Material</span>
                  <select className="fi fi-wide" value={matType} onChange={e=>onMT(e.target.value)}>
                    <option value="Ferrous">Ferrous</option>
                    <option value="Non-Ferrous">Non-Ferrous</option>
                  </select>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                  <span style={{fontSize:'11.5px',fontWeight:600,color:'#1e3a6e'}}>Plate Specification</span>
                  <select className="fi fi-full" style={{width:'100%'}} value={spec} onChange={e=>setSpec(e.target.value)}>
                    {specs.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
            </div>

            {/* 02 설계 조건 */}
            <div className="card">
              <div className="card-hdr"><div className="badge">02</div><div className="card-title">설계 조건 (DESIGN CONDITIONS)</div></div>
              <div className="card-body">
                {/* 2-col dropdowns */}
                <div className="fg2">
                  <div className="fg2-item">
                    <span className="fl2">Orientation</span>
                    <select className="fi" style={{width:'100%'}} value={orient} onChange={e=>setOrient(e.target.value)}>
                      <option>수평 (Horizontal)</option><option>수직 (Vertical)</option>
                    </select>
                  </div>
                  <div className="fg2-item">
                    <span className="fl2">Head Type</span>
                    <select className="fi" style={{width:'100%'}} value={head} onChange={e=>setHead(e.target.value)}>
                      <option>2:1 Ellipsoidal</option><option>Hemispherical</option>
                      <option>ASME F&amp;D</option><option>Flat</option>
                    </select>
                  </div>
                </div>
                <hr className="cdiv"/>
                {/* 2-col: P, T */}
                <div className="fg2">
                  <div className="fg2-item">
                    <span className="fl2">Design Pressure <b>P</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={DP} onChange={e=>setDP(e.target.value)}/>
                      <span className="fu">kg/cm²G</span>
                    </div>
                    <div className="sub-txt">= {dpMPa} MPaG</div>
                  </div>
                  <div className="fg2-item">
                    <span className="fl2">Design Temp. <b>T</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={DT} onChange={e=>setDT(e.target.value)}/>
                      <span className="fu">°C</span>
                    </div>
                  </div>
                </div>
                {/* 2-col: D, L */}
                <div className="fg2">
                  <div className="fg2-item">
                    <span className="fl2">Inner Diameter <b>D</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={D} onChange={e=>setD(e.target.value)}/>
                      <span className="fu">mm</span>
                    </div>
                  </div>
                  <div className="fg2-item">
                    <span className="fl2">Vessel Length <b>L</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={L} onChange={e=>setL(e.target.value)}/>
                      <span className="fu">mm</span>
                    </div>
                  </div>
                </div>
                {/* 2-col: H, rhoL */}
                <div className="fg2">
                  <div className="fg2-item">
                    <span className="fl2">Liquid Height <b>H</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={H} onChange={e=>setH(e.target.value)}/>
                      <span className="fu">mm</span>
                    </div>
                  </div>
                  <div className="fg2-item">
                    <span className="fl2">Liquid Density <b>ρl</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={rhoL} onChange={e=>setRhoL(e.target.value)}/>
                      <span className="fu">kg/m³</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* 02 하단 — 용기 형상 미리보기 */}
            <div className="card" style={{overflow:'hidden'}}>
              <div className="card-hdr">
                <div className="badge" style={{background:'#3b62b8',fontSize:9,letterSpacing:0}}>◎</div>
                <div className="card-title" style={{color:'#3b62b8'}}>형상 미리보기</div>
                <span style={{marginLeft:'auto',fontSize:9.5,color:'#94a3b8'}}>입력값 실시간 반영</span>
              </div>
              <div style={{padding:'6px 10px 8px',background:'#f8faff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Diagram D={parseFloat(D)||2000} L={parseFloat(L)||5000} H={parseFloat(H)||1700} orient={orient}/>
              </div>
            </div>

            {/* 03 자동 산정값 */}
            <div className="card">
              <div className="card-hdr"><div className="badge">03</div><div className="card-title">자동 산정값 (AUTO-DERIVED)</div></div>
              <div className="card-body">
                {/* S full-width (has User checkbox) */}
                <div className="fr">
                  <span className="fl">Allowable Stress <b>S</b></span>
                  <input className={`fi ${useUS?'':'fi-auto'}`} style={useUS?{}:{pointerEvents:'none'}}
                    type="number" value={useUS?userS:autoS}
                    onChange={e=>setUserS(e.target.value)}/>
                  <span className="fu">kg/cm²</span>
                  <label style={{display:'flex',alignItems:'center',gap:3,fontSize:11,color:'#64748b',whiteSpace:'nowrap',cursor:'pointer'}}>
                    <input type="checkbox" checked={useUS} onChange={e=>setUseUS(e.target.checked)}/> User
                  </label>
                </div>
                {!useUS&&autoS&&<div className="sub-txt">— {spec.split(',')[0].trim()}, {DT}°C 보간값</div>}
                {/* 2-col: CA, E */}
                <div className="fg2">
                  <div className="fg2-item">
                    <span className="fl2">Corrosion Allow. <b>CA</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={CA} onChange={e=>setCA(e.target.value)}/>
                      <span className="fu">mm</span>
                    </div>
                  </div>
                  <div className="fg2-item">
                    <span className="fl2">Joint Efficiency <b>E</b></span>
                    <select className="fi" style={{width:'100%'}} value={E} onChange={e=>setE(e.target.value)}>
                      <option value="1.00">1.00 Full RT</option>
                      <option value="0.85">0.85 Spot RT</option>
                      <option value="0.70">0.70 No RT</option>
                      <option value="0.65">0.65</option>
                      <option value="0.60">0.60</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            {/* 04 두께 입력 */}
            <div className="card">
              <div className="card-hdr">
                <div className="badge">04</div>
                <div className="card-title">두께 입력 (THICKNESS INPUT)&nbsp;<span style={{fontWeight:400,color:'#94a3b8',fontSize:11}}>— 선택사항</span></div>
              </div>
              <div className="card-body">
                <div className="fg2">
                  <div className="fg2-item">
                    <span className="fl2">Shell Th'k <b>ts</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={ts_in} onChange={e=>setTsIn(e.target.value)} placeholder="자동"/>
                      <span className="fu">mm</span>
                    </div>
                  </div>
                  <div className="fg2-item">
                    <span className="fl2">Head Th'k <b>th</b> (B.F.)</span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={th_in} onChange={e=>setThIn(e.target.value)} placeholder="자동"/>
                      <span className="fu">mm</span>
                    </div>
                  </div>
                </div>
                <div className="warn-txt">※ 비워두면 최소 두께 자동 적용</div>
              </div>
            </div>

            {/* 05 보온재 */}
            <div className="card">
              <div className="card-hdr"><div className="badge">05</div><div className="card-title">보온재 (INSULATION)</div></div>
              <div className="card-body">
                <div className="fg2">
                  <div className="fg2-item">
                    <span className="fl2">Density <b>ρi</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={rhoI} onChange={e=>setRhoI(e.target.value)}/>
                      <span className="fu">kg/m³</span>
                    </div>
                  </div>
                  <div className="fg2-item">
                    <span className="fl2">Thickness <b>ti</b></span>
                    <div className="fg2-row">
                      <input className="fi fi-s" type="number" value={ti} onChange={e=>setTi(e.target.value)}/>
                      <span className="fu">mm</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* 검토 실행 버튼 — 스크롤 영역 내부 */}
            <div style={{padding:'4px 0 2px'}}>
              <button className="btn-calc" onClick={doCalc}>검토 실행 ▶</button>
              <div className="warn-txt" style={{textAlign:'center',fontSize:10,marginTop:4}}>
                ※ 기본값은 참고용입니다. 적용 코드/사양으로 재확인하세요.
              </div>
            </div>

          </div>{/* /left-scroll */}
        </div>{/* /left */}

        {/* ═══ RESIZE DIVIDER ═══ */}
        <div onMouseDown={onDivider}
             style={{width:5, flexShrink:0, cursor:'col-resize', background:'#d8e0f0',
                     transition:'background .15s', position:'relative', zIndex:10}}
             onMouseEnter={e=>e.currentTarget.style.background='#4472c4'}
             onMouseLeave={e=>e.currentTarget.style.background='#d8e0f0'}>
          <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
                       color:'#94a3b8',fontSize:14,pointerEvents:'none',userSelect:'none'}}>⋮</div>
        </div>

        {/* ═══ RIGHT ═══ */}
        <div className="right">

          {/* Top: title bar */}
          <div className="res-head-card">
            <div className="res-head-info">
              <div className="res-title">검토 결과</div>
              <div className="res-sub">두께 · MAWP · 부피 · 표면적 · 중량</div>
            </div>
          </div>

          {/* Empty state */}
          {!r && (
            <div className="empty">
              <div className="empty-icon">🏭</div>
              <div className="empty-txt">입력값을 확인하고 검토 실행을 누르면<br/>두께·MAWP·중량 결과가 표시됩니다.</div>
            </div>
          )}

          {/* Error */}
          {r?.err && (
            <div className="alert alert-err"><span>❌</span>{r.err}</div>
          )}

          {r && !r.err && <>

            {/* Alert */}
            {r.warns?.length>0
              ? <div className="alert alert-warn"><span>⚠️</span><div>{r.warns.map((w,i)=><div key={i}>{w}</div>)}</div></div>
              : <div className="alert alert-ok"><span>✅</span> 설계 조건 적합 — 경고 없음</div>
            }

            {/* ── 두께 결과 ── */}
            <div className="rtbl">
              <div className="rtbl-hdr-row" style={{gridTemplateColumns:tCols}}>
                <div className="th lft">두께 결과 (Thickness)</div>
                <div className="th">허용응력 S<div className="th-sub">kg/cm²</div></div>
                <div className="th">ts 필요<div className="th-sub">mm (ts')</div></div>
                <div className="th">ts 사용<div className="th-sub">mm</div></div>
                <div className="th">th 필요 B.F.<div className="th-sub">mm (th')</div></div>
                <div className="th">th 필요 A.F.<div className="th-sub">mm (tf')</div></div>
                <div className="th">th 사용<div className="th-sub">mm</div></div>
              </div>
              <div className="dr" style={{gridTemplateColumns:tCols}}>
                <div className="td lft">{spec.split(',')[0]} · {head}</div>
                <div className="td"><span className="v">{r.S}</span></div>
                <div className="td"><span className="v">{r.ts_prime}</span></div>
                <div className="td"><span className={parseFloat(r.ts_used)>=parseFloat(r.ts_prime)?'v-ok':'v-ng'}>{r.ts_used}</span></div>
                <div className="td"><span className="v">{r.th_prime}</span></div>
                <div className="td"><span className="v">{r.tf_prime}</span></div>
                <div className="td"><span className={parseFloat(r.th_used)>=parseFloat(r.th_prime)?'v-ok':'v-ng'}>{r.th_used}</span></div>
              </div>
            </div>

            {/* ── MAWP ── */}
            <div className="rtbl">
              <div className="rtbl-hdr-row" style={{gridTemplateColumns:mCols}}>
                <div className="th lft">MAWP · 정수압</div>
                <div className="th">Shell MAWP Ms<div className="th-sub">kg/cm²G</div></div>
                <div className="th">Head MAWP Mh<div className="th-sub">kg/cm²G</div></div>
                <div className="th">정수압 SPs<div className="th-sub">kg/cm²G</div></div>
                <div className="th">판정 / Remark</div>
              </div>
              <div className="dr" style={{gridTemplateColumns:mCols}}>
                <div className="td lft">설계압력 P = {DP} kg/cm²G</div>
                <div className="td"><span className={r.Ms_ok?'v-ok':'v-ng'}>{r.Ms}</span></div>
                <div className="td"><span className={r.Mh_ok?'v-ok':'v-ng'}>{r.Mh}</span></div>
                <div className="td"><span className="v">{r.SPs}</span></div>
                <div className="td"><span className={r.Ms_ok&&r.Mh_ok?'v-ok':'v-ng'}>{r.Ms_ok&&r.Mh_ok?'✔ OK':'✘ NG'}</span></div>
              </div>
            </div>

            {/* ── 부피 + 표면적 ── */}
            <div className="grid2">
              <div className="rtbl">
                <div className="rtbl-hdr-row" style={{gridTemplateColumns:vCols}}>
                  <div className="th lft">부피 (Volume)</div>
                  <div className="th">기호</div>
                  <div className="th">Vessel<div className="th-sub">liter</div></div>
                  <div className="th">Liquid<div className="th-sub">liter</div></div>
                </div>
                {[['Shell Volume','Vs',r.Vs_v,r.Vs_l],['Head Volume','Vh',r.Vh_v,r.Vh_l],['Total Volume','V',r.Vt_v,r.Vt_l]].map(([lbl,sym,vv,vl])=>(
                  <div key={lbl} className="dr" style={{gridTemplateColumns:vCols}}>
                    <div className="td lft">{lbl}</div>
                    <div className="td"><span className="v-dim">{sym}</span></div>
                    <div className="td"><span className="v">{vv}</span></div>
                    <div className="td"><span className="v">{vl}</span></div>
                  </div>
                ))}
              </div>
              <div className="rtbl">
                <div className="rtbl-hdr-row" style={{gridTemplateColumns:'1.5fr .6fr 1fr 1fr 1fr'}}>
                  <div className="th lft">표면적 (Surface Area)</div>
                  <div className="th">기호</div>
                  <div className="th">Material<div className="th-sub">m²</div></div>
                  <div className="th">Painting<div className="th-sub">m²</div></div>
                  <div className="th">Insulation<div className="th-sub">m²</div></div>
                </div>
                {[['Shell Surf.','As',r.As,r.As_p,r.As_i],['Head Surf. (×2)','Ah',r.Ah,r.Ah_p,r.Ah_i],['Total Surf.','At',r.At,r.At_p,r.At_i]].map(([lbl,sym,vm,vp,vi])=>(
                  <div key={lbl} className="dr" style={{gridTemplateColumns:'1.5fr .6fr 1fr 1fr 1fr'}}>
                    <div className="td lft">{lbl}</div>
                    <div className="td"><span className="v-dim">{sym}</span></div>
                    <div className="td"><span className="v">{vm}</span></div>
                    <div className="td"><span className="v">{vp}</span></div>
                    <div className="td"><span className="v">{vi}</span></div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── 중량 ── */}
            <div className="rtbl">
              <div className="rtbl-hdr-row" style={{gridTemplateColumns:wCols}}>
                <div className="th lft">중량 (Weight)</div>
                <div className="th">Shell Ws<div className="th-sub">kg</div></div>
                <div className="th">Head Wh<div className="th-sub">kg</div></div>
                <div className="th">Net Total Wt<div className="th-sub">kg</div></div>
                <div className="th">공운전 We<div className="th-sub">kg</div></div>
                <div className="th">운전중 Wo<div className="th-sub">kg</div></div>
              </div>
              <div className="dr" style={{gridTemplateColumns:wCols}}>
                <div className="td lft">ρm {r.den} kg/m³ &nbsp;|&nbsp; 보온재 Wi = {r.Wi} kg</div>
                <div className="td"><span className="v">{r.Ws}</span></div>
                <div className="td"><span className="v">{r.Wh}</span></div>
                <div className="td"><span className="v">{r.Wt}</span></div>
                <div className="td"><span className="v">{r.We}</span></div>
                <div className="td"><span className="v">{r.Wo}</span></div>
              </div>
            </div>

            <div className="ref-bar">
              계산식: ts = P·R / (S·E − 0.6P) &nbsp;[UG-27] &nbsp;|&nbsp; th = P·D / (2·S·E − 0.2P) &nbsp;[UG-32] &nbsp;|&nbsp; MAWP = S·E·t / (R + 0.6t)
              &nbsp;|&nbsp; B.F. = Before Forming / A.F. = After Forming (12.5% 감육 고려) &nbsp;|&nbsp;
              허용응력(S): ASME BPVC Sec.II Part D Table 1A/1B · UCS-23 · UHA-23 보간값 (kgf/cm²) — 적용 에디션으로 재확인 필요.
            </div>
          </>}

        </div>{/* /right */}
      </div>{/* /root */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
